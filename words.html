<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="image/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Words</title>
    <link rel="stylesheet" href="style/index.min.css">
    <!-- <link rel="stylesheet" href="style/404.css"> -->
    <script src="javascript/index.min.js"></script>
    <style>
        *{
            box-sizing: border-box;
        }
        form.example{
            border-bottom:1px solid black ;
        }
        form.example input[type=text] {
  padding: 10px;
  font-size: 17px;
  border: 1px solid white;
  background-color: white;
  border-left: 1px solid black;
  float: left;
  width: calc( 100% - 150px);
  /* background: #f1f1f1; */
}

form.example select {
  float: left;
  width: 110px;
  padding: 10px;
  padding-left: 5px;
  padding-right: 5px;
  /* background: #7fbaeb; */
  /* color: white; */
  font-size: 17px;
  border: 1px solid white;
  /* border-left: none; */
  cursor: pointer;
}

form.example select option{
    text-align: center;
    cursor: pointer;
    border: 1px solid black;
}


form.example button {
  float: right;
  width: 40px;
  padding-top: 10px;
  padding-bottom: 10px;
  background: white;
  /* color: white; */
  font-size: 17px;
  border: 1px solid white;
  border-left: none;
  cursor: pointer;
}

form.example button:hover {
    font-size: 20px;
    padding-top: 7px;
    padding-top: 7px;
}

form.example::after {
  content: "";
  clear: both;
  display: table;
}

div.result{
    width: 100%;
    text-align: center;
}
</style>
</head>
<body>
    <div class="main-containt" id="main">
        <div class="logo">Words
            <button class="openbtn" onclick="menu()" id="menubtn">&#9776;</button>
        </div>
            <div id="menupanel" class="sidepanel">
                <a href="https://rpkc.github.io/"><i class="fa fa-home" aria-hidden="true"></i> Home</a>
                <a href="https://rpkc.github.io/contact"><i class="fa fa-phone-square" aria-hidden="true"></i> Contact</a>
                <a href="https://rpkc.github.io/words"><i class="fa fa-database" aria-hidden="true"></i> Words</a>
            </div>
			  
            <div class="main-body" id="mainbody">
                <form class="example">
                    <select name="t" id="type">
                        <option value="m">Meaning</option>
                        <option value="o">Opposite</option>
                        <option value="s">Synonym</option>
                      </select>
                    <input type="text" placeholder="Search.." name="w" required>
                    <button><i class="fa fa-search"></i></button>
                  </form>
                  <div class="result">
                      <h2>WORD</h2>
                      <h4>Part of speech</h4>
                  </div>
            </div>
              
			 <div class="footer">
