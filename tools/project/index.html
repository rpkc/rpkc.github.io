<!DOCTYPE html>
<html lang="en">
    <head>
        <!--<link rel="icon" type="image/png" href="icon.png"/>-->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="keywords" content="Base calculator, Base converter, Binary ,Hex ,Octal">
        <meta name="description" content="Base calculator and base converter for Math and CSE">
        <meta name="author" content="Rupak Chowdhury">


        <title>base calculator | rpkc</title>

        
        
        <style>
            @font-face {
                font-family: michroma;
                src: url("https://rpkc.github.io/fonts/Michroma-Regular.ttf");
            }
            * {box-sizing: border-box;
            font-family: michroma;}
            .column {
            float: left;
            width: 50%;
            padding: 10px;
            }

/* Clear floats after the columns */
.row:after {
  content: "";
  display: table;
  clear: both;
}

@media screen and (max-width: 850px) {
  .column {
    width: 100%;
  }
}
            .calc{
                box-shadow: 0 4px 8px 0 darkslategray;
                padding: 8px 8px;
                border: 2px solid darkslategray;
                border-radius: 10px;
                /* background-color:; */
            }
            .logo{text-align: center;font-size: 30px;}
            .center{text-align: center;}
            a.nodec{text-decoration: none;}
            select{ text-align: center;  font-weight: bold;}
            button{width: calc(100%); padding: 5px;cursor: pointer; font-weight: bold;}
            
            input{ padding-top: 5px; padding-bottom: 5px; width: calc(100%);
            font-size: 18px;text-transform:uppercase;
             }
            select{  padding: 5px; width: calc(100%);cursor: pointer; }
            textarea{ padding: 5px; width: calc(100%);font-size: 18px;border-radius: 8px;}
            footer{text-align: center;}
        
        </style>
        <script src="scripts/bignum.js"></script>
        <script src="scripts/bincalc.js"></script>
    </head>
    

    <body>
        <h1 class="logo">Base Calculator</h1>
        <h2 class="center">any issue? just take a screen shot and <a class="nodec" href="mailto:rpkc.mail@gmail.com">eMail</a> us</h3>
        <hr>
            <div class="row">
            <div class="column">
        <!--main table for calculator structure-->
        <table class="calc" width="100%">
            <tr>
                <td>
                    <h1>Base Converter</h1>
                </td>
            </tr>    
            <tr>
                <td>
                    <input id="inputbox" autocomplete="off" placeholder="Enter a Number">
                </td>
            </tr>
            
            <tr>
                <td>
                    
                    <select name="input base" id="ibase1" autocomplete="off">
                        <option value="0">SELECT INPUT BASE</option>
                        <option value="2">BIN (2)</option>
                        <option value="8">OCT (8)</option>
                        <option value="10">DEC (10)</option>
                        <option value="16">HEX (16)</option>
                    </select>
                </td>
            </tr>   
            
            <tr>
                <td>
                    <select name="output base" id="obase" autocomplete="off">
                        <option value="0">SELECT OUTPUT BASE</option>
                        <option value="2">BIN (2)</option>
                        <option value="8">OCT (8)</option>
                        <option value="10">DEC (10)</option>
                        <option value="16">HEX (16)</option>
                    </select>
                </td>
            </tr>             
            <tr>
                <td>
                    <textarea name="output box" id="outputbox1" cols="35" rows="4" readonly="readonly" placeholder="output" autocomplete="off"></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <table id="buttonBox" width=100%>
                        <tr>
                            <td>
                                <button onclick="convertV()">CONVERT</button>
                            </td>
                        </tr>
                    </table>    
                </td>
            </tr>            
        </table><!--End the table of "convcal"-->
</div>

<div class="column">

        <!--main table for base calculator structure-->
        <table class="calc" width="100%" higth="100%">
            <tr>
                <td>
                    <h1>Base Calculator</h1>
                </td>
            </tr>    
            <tr>
                <td>
                    
                    <select name="input base" id="ibase2" autocomplete="off">
                        <option value="0">SELECT INPUT BASE</option>
                        <option value="2">BIN (2)</option>
                        <option value="8">OCT (8)</option>
                        <option value="10">DEC (10)</option>
                        <option value="16">HEX (16)</option>
                    </select>
                </td>
            </tr>   
            <tr>
                <td>
                    <input id="inputbox1" autocomplete="off" placeholder="Enter 1st Number">
                </td>
            </tr>
            <tr>
                <td>
                    <select name="operation selector" id="opsel" autocomplete="off">
                        <option value="">SELECT OPERATION</option>
                        <option value="+"> ADDITION (+)</option>
                        <option value="-">SUBTRACTION (-)</option>
                        <option value="*">MULTIPLICATION (×)</option>
                        <option value="/">DIVISION (÷)</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <input id="inputbox2" autocomplete="off" placeholder="Enter 2nd Number">
                </td>
            </tr>             
            <tr>
                <td>
                    <textarea name="output box" id="outputbox2" cols="35" rows="2" readonly="readonly" placeholder="output" autocomplete="off"></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <table id="buttonBox" width=100%>
                        <tr>
                            <td>
                                <button onclick="calculateV()">CALCULATE</button>
                            </td>
                        </tr>
                    </table>    
                </td>
            </tr>            
        </table><!--End the table of "convcal"-->
</div>
</div>

<hr>
<footer>

</footer>

</html>
