<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Leave a Message or Feedback or Query for rpkc">
    <meta name="keywords" content="rpkc, github">
    <meta name="author" content="Rupak Chowdhury">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="icon/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>rpkc</title>
    <link rel="stylesheet" href="style/index.css">
    
</head>
    <div class="main-containt">
        <div class="logo">rpkc<span class="sublogo">.github.io</span></div>
            <form  method="post" autocomplete="off" name="contact">
                <div>
                    <label for="message"> &#xf075; Leave a Message</label>
                    <textarea id="message" name="MESSAGE" placeholder="Write something.." style="height:150px" required></textarea>
                </div>
                <div>
                    <label for="name"> &#xf007; Name:</label>
                    <input type="text" id="name" name="NAME"  placeholder="Your name.." required>
                </div>
                <div>              
                <label for="email">&#xf0e0; Email (For Reply):</label>
                <input type="text" id="email" name="EMAIL" placeholder="Ex: someone@example.com" required>
            </div>
                <input type="submit" value="Send &#xf1d8;">
              </form>
              <div class="footer">Powered by AppSheet</div>
    </div>
    <div id="overlay" >
        <div id="text"><i class="fa fa-spinner fa-pulse"></i> Sending...</div>
      </div>
      <div id="snackbar">Thanks for message &#x1F60E;</div>
<script src="javascript/send.js"></script>
   </body>
</html>
