<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Leave a Message or Feedback or Query for rpkc">
    <meta name="keywords" content="rpkc, github">
    <meta name="author" content="Rupak Chowdhury">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
    <div class="main-containt">
        <div class="logo">rpkc<span class="sublogo">.github.io</span></div>
            <form  method="post" autocomplete="off" name="contact">
                <div>
                    <label for="message">Leave a Message &#128172;</label>
                    <textarea id="message" name="MESSAGE" placeholder="Write something.." style="height:150px" required></textarea>
                </div>
                <div>
                    <label for="name">Name &#x1F451; :</label>
                    <input type="text" id="name" name="NAME"  placeholder="Your name.." required>
                </div>
                <div>              
                <label for="email">Email Address &#x1F4E7; :</label>
                <input type="text" id="email" name="EMAIL" placeholder="Ex: someone@example.com" required>
            </div>
                <input type="submit" value="Send &#128640;">
              </form>
              <div class="footer"></div>
    </div>
    <div id="overlay" >
        <div id="text">&#9203; Sending...</div>
      </div>
      <div id="snackbar">Thanks for message &#x1F60E;</div>
<script src="javascript/send.js"></script>
   </body>
</html>
